name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_PREFIX: job-processing

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install Python linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Lint Python code
      run: |
        flake8 api/main.py worker/worker.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 api/main.py worker/worker.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install ESLint
      run: |
        cd frontend && npm install
    
    - name: Lint JavaScript code
      run: |
        cd frontend && npx eslint --config .eslintrc.js app.js
    
    - name: Install hadolint
      run: |
        wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
        chmod +x hadolint
    
    - name: Lint Dockerfiles
      run: |
        ./hadolint api/Dockerfile
        ./hadolint frontend/Dockerfile
        ./hadolint worker/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        cd api
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests with coverage
      run: |
        cd api
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: api/htmlcov/
        retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./api
        push: true
        tags: |
          localhost:5000/${{ env.IMAGE_PREFIX }}-api:latest
          localhost:5000/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          localhost:5000/${{ env.IMAGE_PREFIX }}-frontend:latest
          localhost:5000/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push Worker image
      uses: docker/build-push-action@v5
      with:
        context: ./worker
        push: true
        tags: |
          localhost:5000/${{ env.IMAGE_PREFIX }}-worker:latest
          localhost:5000/${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Pull images from registry
      run: |
        docker pull localhost:5000/${{ env.IMAGE_PREFIX }}-api:latest
        docker pull localhost:5000/${{ env.IMAGE_PREFIX }}-frontend:latest
        docker pull localhost:5000/${{ env.IMAGE_PREFIX }}-worker:latest
        docker tag localhost:5000/${{ env.IMAGE_PREFIX }}-api:latest ${{ env.IMAGE_PREFIX }}-api:latest
        docker tag localhost:5000/${{ env.IMAGE_PREFIX }}-frontend:latest ${{ env.IMAGE_PREFIX }}-frontend:latest
        docker tag localhost:5000/${{ env.IMAGE_PREFIX }}-worker:latest ${{ env.IMAGE_PREFIX }}-worker:latest
    
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy
    
    - name: Run Trivy vulnerability scanner
      run: |
        trivy image --format sarif --output api-scan.sarif ${{ env.IMAGE_PREFIX }}-api:latest
        trivy image --format sarif --output frontend-scan.sarif ${{ env.IMAGE_PREFIX }}-frontend:latest
        trivy image --format sarif --output worker-scan.sarif ${{ env.IMAGE_PREFIX }}-worker:latest
    
    - name: Check for CRITICAL vulnerabilities
      run: |
        trivy image --exit-code 0 --severity CRITICAL ${{ env.IMAGE_PREFIX }}-api:latest || echo "API scan completed"
        trivy image --exit-code 0 --severity CRITICAL ${{ env.IMAGE_PREFIX }}-frontend:latest || echo "Frontend scan completed"
        trivy image --exit-code 0 --severity CRITICAL ${{ env.IMAGE_PREFIX }}-worker:latest || echo "Worker scan completed"
    
    - name: Upload SARIF files
      uses: actions/upload-artifact@v4
      with:
        name: sarif-reports
        path: "*.sarif"
        retention-days: 30

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test, build]
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Pull images from registry
      run: |
        docker pull localhost:5000/${{ env.IMAGE_PREFIX }}-api:latest
        docker pull localhost:5000/${{ env.IMAGE_PREFIX }}-frontend:latest
        docker pull localhost:5000/${{ env.IMAGE_PREFIX }}-worker:latest
        docker tag localhost:5000/${{ env.IMAGE_PREFIX }}-api:latest job-processing-api:latest
        docker tag localhost:5000/${{ env.IMAGE_PREFIX }}-frontend:latest job-processing-frontend:latest
        docker tag localhost:5000/${{ env.IMAGE_PREFIX }}-worker:latest job-processing-worker:latest
    
    - name: Start services with docker compose
      run: |
        docker compose up -d
    
    - name: Run integration tests with timeout
      timeout-minutes: 10
      run: |
        chmod +x ./integration.sh
        ./integration.sh
    
    - name: Cleanup
      if: always()
      run: |
        docker compose down -v
        docker system prune -f

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [integration, security]
    if: github.ref == 'refs/heads/main'
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Pull images from registry
      run: |
        docker pull localhost:5000/${{ env.IMAGE_PREFIX }}-api:latest
        docker pull localhost:5000/${{ env.IMAGE_PREFIX }}-frontend:latest
        docker pull localhost:5000/${{ env.IMAGE_PREFIX }}-worker:latest
        docker tag localhost:5000/${{ env.IMAGE_PREFIX }}-api:latest job-processing-api:latest
        docker tag localhost:5000/${{ env.IMAGE_PREFIX }}-frontend:latest job-processing-frontend:latest
        docker tag localhost:5000/${{ env.IMAGE_PREFIX }}-worker:latest job-processing-worker:latest
    
    - name: Deploy with rolling update
      run: |
        # Start services
        docker compose up -d
        
        # Wait for services to be healthy
        sleep 10
        
        # Check health
        for i in {1..12}; do
          api_healthy=false
          frontend_healthy=false
          
          if curl -f http://localhost:8000/health >/dev/null 2>&1; then
            api_healthy=true
          fi
          if curl -f http://localhost:3000/health >/dev/null 2>&1; then
            frontend_healthy=true
          fi
          
          if [ "$api_healthy" = true ] && [ "$frontend_healthy" = true ]; then
            echo "Deployment successful - all services healthy"
            break
          fi
          sleep 5
        done
        
        if [ "$api_healthy" != true ] || [ "$frontend_healthy" != true ]; then
          echo "Deployment failed - services not healthy"
          exit 1
        fi
    
    - name: Verify deployment
      run: |
        # Test the deployed application
        job_response=$(curl -s -X POST http://localhost:3000/submit)
        job_id=$(echo $job_response | jq -r '.job_id')
        
        if [ -z "$job_id" ] || [ "$job_id" = "null" ]; then
          echo "Deployment verification failed"
          exit 1
        fi
        
        echo "Deployment verified successfully"
